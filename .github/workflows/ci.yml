name: ci

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test-lint:
    name: Dev CI (locked, lint + tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (locked dev toolchain)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt
          python -m pip install -e . --no-deps

      - name: Verify lockfile is up to date
        shell: bash
        run: |
          python -m piptools compile \
            --extra dev \
            --extra quantlib \
            --no-strip-extras \
            -c requirements/dev.txt \
            pyproject.toml \
            -o /tmp/dev.txt
          diff -u <(grep -vE '^\s*#' requirements/dev.txt) <(grep -vE '^\s*#' /tmp/dev.txt)

      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Smoke import
        run: |
          python -c "import portfolio_analytics; print('import ok')"

      - name: Pytest
        run: |
          pytest src/portfolio_analytics/tests/ \
              --cov=portfolio_analytics \
              --cov-report=term-missing \
              --cov-branch \
              -q

  compatibility:
    name: Compatibility (resolver-based)
    runs-on: ubuntu-latest
    needs: test-lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (resolver-based)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[quantlib]"
          python -m pip install pytest pytest-xdist

      - name: Smoke import
        run: |
          python -c "import portfolio_analytics; print('import ok')"

      - name: Pytest
        run: |
          pytest src/portfolio_analytics/tests/ -q -n auto


  notebooks:
    name: Notebooks (execute)
    runs-on: ubuntu-latest
    needs: test-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (resolver-based notebook runtime)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[jupyter]"

      - name: Execute notebooks
        shell: bash
        run: |
          set -euo pipefail
          NOTEBOOK_DIRS=("tutorials" "examples")

          found_any=0
          for d in "${NOTEBOOK_DIRS[@]}"; do
            if [[ -d "$d" ]]; then
              while IFS= read -r nb; do
                found_any=1
                echo "=== Executing: $nb ==="
                jupyter nbconvert \
                  --execute \
                  --to notebook \
                  --output-dir /tmp/nb-out \
                  --ExecutePreprocessor.kernel_name=python3 \
                  --ExecutePreprocessor.timeout=600 \
                  "$nb"
              done < <(find "$d" -type f -name "*.ipynb" | sort)
            fi
          done

          if [[ "$found_any" -eq 0 ]]; then
            echo "No notebooks found in: ${NOTEBOOK_DIRS[*]} (skipping)"
          fi

  cross-platform:
    name: Cross-platform
    runs-on: ${{ matrix.os }}
    needs: test-lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (resolver-based)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[jupyter]"
          python -m pip install pytest

      - name: Smoke import
        run: |
          python -c "import portfolio_analytics; print('import ok')"

      - name: Pytest (core subset)
        run: |
          pytest src/portfolio_analytics/tests/ -q -k "bsm or binomial or mcs"

      - name: Execute one notebook
        shell: bash
        run: |
          jupyter nbconvert \
            --execute \
            --to notebook \
            --output-dir /tmp/nb-out \
            --ExecutePreprocessor.kernel_name=python3 \
            --ExecutePreprocessor.timeout=600 \
            tutorials/06_asian_options.ipynb